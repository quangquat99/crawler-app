spring.application.name=crawler-app

# API demo: khi bat se tu crawl URL mau luc startup de xem log.
crawler.demo.enabled=false
crawler.demo.url=https://www.jctrans.com/en/company/

# Timeout crawl co ban.
crawler.http.connect-timeout-ms=10000
crawler.http.read-timeout-ms=15000
crawler.http.write-timeout-ms=15000
crawler.http.max-body-log-length=1200

# Cau hinh Playwright.
crawler.playwright.headless=true
crawler.playwright.timeout-ms=30000

# JPA/PostgreSQL: da co dependency va package structure,
# nhung hien tai chua bat datasource vi yeu cau moi chi log du lieu.
# Khi can luu DB, bo exclude trong Application class va mo phan duoi.
# spring.datasource.url=jdbc:postgresql://localhost:5432/crawler_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.open-in-view=false

logging.level.com.quangph.crawlerapp=INFO
